<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Transmissão ao vivo — WebTV Junior">
    <meta name="theme-color" content="#161b22">
    <meta name="color-scheme" content="dark">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WebTV Junior">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Web TV Junior - Ao Vivo</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #121212; color: #e6edf3; font-family: system-ui, -apple-system, Segoe UI, sans-serif; text-align: center; margin: 0; padding: 1rem 1rem 5rem; min-height: 100vh; box-sizing: border-box; }
        video { width: 100%; max-width: 800px; border: 2px solid #2ea043; border-radius: 8px; background: #000; }
        #pwa-install-btn {
            position: fixed;
            right: 12px;
            bottom: 12px;
            z-index: 1000;
            padding: 0.5rem 0.85rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #e6edf3;
            background: rgba(22, 27, 34, 0.92);
            border: 1px solid #30363d;
            border-radius: 999px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s ease, border-color 0.15s ease, opacity 0.15s ease;
        }
        #pwa-install-btn:hover { background: #21262d; border-color: #388bfd; }
        #pwa-install-btn:active { opacity: 0.9; }
        #pwa-install-btn[hidden] { display: none !important; }
    </style>
</head>
<body>
    <h1>🎥 Transmissão Ao Vivo</h1>
    <video id="video" controls></video>

    <button type="button" id="pwa-install-btn" hidden aria-label="Instalar WebTV Junior como aplicativo">Instalar App</button>

    <script>
        var video = document.getElementById('video');
        var videoSrc = 'http://51.81.17.162:8080/index.m3u8';
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
    <script>
        (function () {
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function () {
                    navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function () {});
                });
            }

            var installBtn = document.getElementById('pwa-install-btn');
            var deferredPrompt = null;

            window.addEventListener('beforeinstallprompt', function (e) {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.hidden = false;
            });

            installBtn.addEventListener('click', function () {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                deferredPrompt.userChoice.finally(function () {
                    deferredPrompt = null;
                    installBtn.hidden = true;
                });
            });

            window.addEventListener('appinstalled', function () {
                deferredPrompt = null;
                installBtn.hidden = true;
            });
        })();
    </script>
</body>
</html>
